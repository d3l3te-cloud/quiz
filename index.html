<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="timer">
    <img src="https://cdn-icons-png.flaticon.com/512/3524/3524388.png" alt="clock" />
    <span id="timer-text">0s</span>
  </div>

  <div id="quiz-box">
    <h2 id="question-text"></h2>
    <div class="options" id="options-container"></div>
    
    <button class="clear-btn" onclick="clearSelection()">🧹 Clear Selection</button>

    <div class="controls">
      <button onclick="previousQuestion()" id="prevBtn">⬅ Previous</button>
      <button onclick="nextQuestion()" id="nextBtn">Next ➡</button>
      <button onclick="submitQuiz()" id="submitBtn" style="display: none;">✅ Submit</button>
    </div>
    <p id="resultText"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
