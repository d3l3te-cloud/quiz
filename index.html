<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="quiz-container">
    <div class="header">
      <h1>VITEEE 2024</h1>
      <div class="timer" id="timer">Time: 0s</div>
    </div>

    <div class="question-box">
      <h2 id="question-text"></h2>

      <div class="options" id="options-container"></div>

      <div class="controls">
        <button onclick="submitAnswer()">Submit</button>
        <button onclick="nextQuestion()">Next</button>
        <p id="resultText"></p>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: "log(log_ab a + 1 / log_b ab) is (where ab ≠ 1)",
        options: ["0", "1", "logₐ ab", "log_b ab"],
        correct: "0"
      },
      {
        question: "What is the derivative of sin(x)?",
        options: ["cos(x)", "-cos(x)", "-sin(x)", "tan(x)"],
        correct: "cos(x)"
      },
      {
        question: "Which number is a prime?",
        options: ["4", "6", "9", "7"],
        correct: "7"
      }
    ];

    let currentQuestionIndex = 0;
    let selectedOption = null;
    let timeElapsed = 0;

    function startTimer() {
      setInterval(() => {
        timeElapsed++;
        document.getElementById("timer").textContent = `Time: ${timeElapsed}s`;
      }, 1000);
    }

    function showQuestion() {
      const currentQuestion = questions[currentQuestionIndex];
      document.getElementById("question-text").innerHTML = currentQuestion.question;
      const optionsContainer = document.getElementById("options-container");
      optionsContainer.innerHTML = "";

      currentQuestion.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.innerText = `${String.fromCharCode(65 + i)}. ${opt}`;
        btn.className = "option";
        btn.onclick = () => selectOption(btn);
        optionsContainer.appendChild(btn);
      });

      document.getElementById("resultText").innerText = "";
      selectedOption = null;
    }

    function selectOption(button) {
      document.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
      button.classList.add('selected');
      selectedOption = button.innerText.split('. ')[1];
    }

    function submitAnswer() {
      const result = document.getElementById("resultText");
      const currentQuestion = questions[currentQuestionIndex];

      if (!selectedOption) {
        result.innerText = "Please select an option.";
        result.style.color = "orange";
        return;
      }

      if (selectedOption === currentQuestion.correct) {
        result.innerText = "✅ Correct!";
        result.style.color = "lime";
      } else {
        result.innerText = `❌ Wrong! Correct Answer: ${currentQuestion.correct}`;
        result.style.color = "red";
      }
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < questions.length) {
        showQuestion();
      } else {
        document.querySelector('.question-box').innerHTML = `<h2>🎉 Quiz Completed in ${timeElapsed}s!</h2>`;
      }
    }

    // Start quiz
    showQuestion();
    startTimer();
  </script>
</body>
</html>
